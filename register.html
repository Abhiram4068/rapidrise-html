<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveDrive | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-black': '#000000',
                        'bg-card': '#0a0a0a',
                        'border-color': '#1a1a1a',
                        'text-muted': '#808080',
                        'accent-blue': '#3b82f6',
                        'accent-white': '#e3e3e3',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/css">
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-bg-black text-white font-sans flex items-center justify-center min-h-screen m-0 p-5">

    <div class="auth-card w-full max-w-[550px] bg-bg-card border border-border-color p-10 rounded-[10px] shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
        <div class="auth-header text-center mb-8">
            <div class="logo text-2xl font-bold tracking-[-1px] mb-2">HiveDrive</div>
            <div class="auth-subtitle text-text-muted text-sm">Create your account to start managing files</div>
        </div>

        <form>
            <div class="form-grid grid grid-cols-1 md:grid-cols-2 gap-5">
                
                <div class="form-group mb-[5px]">
                    <label class="block text-[11px] uppercase tracking-[1px] text-text-muted mb-2">First Name</label>
                    <div class="input-wrapper relative flex items-center">
                        <i class="fa-solid fa-user absolute left-4 text-text-muted text-[14px]"></i>
                        <input type="text" name="first_name" required 
                            class="w-full bg-[#111] border border-border-color py-3 pr-4 pl-[45px] rounded-[10px] text-white text-sm outline-none transition-colors focus:border-accent-blue box-border">
                    </div>
                </div>

                <div class="form-group mb-[5px]">
                    <label class="block text-[11px] uppercase tracking-[1px] text-text-muted mb-2">Last Name</label>
                    <div class="input-wrapper relative flex items-center">
                        <i class="fa-solid fa-user absolute left-4 text-text-muted text-[14px]"></i>
                        <input type="text" name="last_name" required 
                            class="w-full bg-[#111] border border-border-color py-3 pr-4 pl-[45px] rounded-[10px] text-white text-sm outline-none transition-colors focus:border-accent-blue box-border">
                    </div>
                </div>

                <div class="form-group mb-[5px]">
                    <label class="block text-[11px] uppercase tracking-[1px] text-text-muted mb-2">Email Address</label>
                    <div class="input-wrapper relative flex items-center">
                        <i class="fa-solid fa-envelope absolute left-4 text-text-muted text-[14px]"></i>
                        <input type="email" name="email" required 
                            class="w-full bg-[#111] border border-border-color py-3 pr-4 pl-[45px] rounded-[10px] text-white text-sm outline-none transition-colors focus:border-accent-blue box-border">
                    </div>
                </div>

                <div class="form-group mb-[5px]">
                    <label class="block text-[11px] uppercase tracking-[1px] text-text-muted mb-2">Date of Birth</label>
                    <div class="input-wrapper relative flex items-center">
                        <i class="fa-solid fa-calendar-days absolute left-4 text-text-muted text-[14px]"></i>
                        <input type="date" name="date_of_birth" required 
                            class="w-full bg-[#111] border border-border-color py-3 pr-4 pl-[45px] rounded-[10px] text-white text-sm outline-none transition-colors focus:border-accent-blue box-border">
                    </div>
                </div>

                <div class="form-group mb-[5px]">
                    <label class="block text-[11px] uppercase tracking-[1px] text-text-muted mb-2">Password</label>
                    <div class="input-wrapper relative flex items-center">
                        <i class="fa-solid fa-lock absolute left-4 text-text-muted text-[14px]"></i>
                        <input type="password" name="password" required 
                            class="w-full bg-[#111] border border-border-color py-3 pr-4 pl-[45px] rounded-[10px] text-white text-sm outline-none transition-colors focus:border-accent-blue box-border">
                    </div>
                </div>

                <div class="form-group mb-[5px]">
                    <label class="block text-[11px] uppercase tracking-[1px] text-text-muted mb-2">Confirm Password</label>
                    <div class="input-wrapper relative flex items-center">
                        <i class="fa-solid fa-shield-halved absolute left-4 text-text-muted text-[14px]"></i>
                        <input type="password" name="confirm_password" required 
                            class="w-full bg-[#111] border border-border-color py-3 pr-4 pl-[45px] rounded-[10px] text-white text-sm outline-none transition-colors focus:border-accent-blue box-border">
                    </div>
                </div>

                <button type="submit" class="btn-submit md:col-span-2 w-full p-[14px] bg-accent-white text-black border-none rounded-[10px] font-semibold text-sm cursor-pointer mt-[15px] transition-all hover:opacity-90 hover:-translate-y-[1px]">
                    Create Account
                </button>
            </div>
        </form>

        <div class="auth-footer mt-6 text-center text-[13px] text-text-muted flex flex-col gap-3">
            <span>Already have an account? <a href="login.html" class="text-accent-blue no-underline font-medium">Log In</a></span>
            <a href="index.html" class="back-home text-[12px] text-text-muted/70 no-underline transition-all hover:opacity-100 hover:text-white">
                Back to Home
            </a>
        </div>
    </div>

</body>
</html>
