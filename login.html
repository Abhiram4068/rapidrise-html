<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveDrive | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --bg-card: #0a0a0a;
            --border-color: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #808080;
            --accent-blue: #3b82f6;
            --accent-white: #e3e3e3;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-wrapper input {
            width: 100%;
            background: #111;
            border: 1px solid var(--border-color);
            padding: 12px 16px 12px 45px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-blue);
            background: #151515;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-white);
            color: black;
            border: none;
            border-radius: 10px; /* Matched to card radius */
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .auth-footer a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
        }

        /* --- Consistent Back to Home Style --- */
        .back-home {
            font-size: 12px;
            color: var(--text-muted) !important;
            opacity: 0.7;
            transition: 0.2s;
        }

        .back-home:hover {
            opacity: 1;
            color: var(--text-main) !important;
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">HiveDrive</div>
            <div class="auth-subtitle">Welcome back. Please login to continue.</div>
        </div>

        <form>
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="auth-footer">
            <span>Don't have an account? <a href="register.html">Join Now</a></span>
            <a href="index.html">
               
                Back to Home
            </a>
        </div>
    </div>

</body>
</html>
